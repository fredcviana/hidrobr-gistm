version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: hidrobr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hidrobr
      POSTGRES_PASSWORD: hidrobr_dev_2025
      POSTGRES_DB: hidrobr_gistm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hidrobr -d hidrobr_gistm']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hidrobr_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ─────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hidrobr_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hidrobr_minio
      MINIO_ROOT_PASSWORD: hidrobr_minio_2025
    ports:
      - '9000:9000'   # API S3
      - '9001:9001'   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # ── MinIO setup (cria bucket automaticamente) ─────────────
  minio_setup:
    image: minio/mc:latest
    container_name: hidrobr_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 hidrobr_minio hidrobr_minio_2025;
      mc mb local/hidrobr-evidences --ignore-existing;
      mc mb local/hidrobr-academy --ignore-existing;
      mc mb local/hidrobr-reports --ignore-existing;
      mc mb local/hidrobr-avatars --ignore-existing;
      echo 'Buckets criados com sucesso';
      "
    restart: on-failure

  # ── pgAdmin (interface visual do banco) ───────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hidrobr_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hidrobr.com.br
      PGADMIN_DEFAULT_PASSWORD: hidrobr_dev_2025
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data:
